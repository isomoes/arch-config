[main]
font=JetBrainsMono Nerd Font:size=20
dpi-aware=no

[mouse]
hide-when-typing=yes

[colors-dark]
# Dark, high-contrast color scheme (matches kitty.conf)
background=111111
foreground=f2f2f2

# text-color cursor-color (kitty: cursor_text_color / cursor)
cursor=111111 66b3ff

selection-background=335577
selection-foreground=ffffff

regular0=1a1a1a
regular1=cc0000
regular2=00aa00
regular3=cc8800
regular4=0066cc
regular5=cc00cc
regular6=00aaaa
regular7=d9d9d9

bright0=808080
bright1=ff0000
bright2=00ff00
bright3=ffaa00
bright4=3399ff
bright5=ff00ff
bright6=00ffff
bright7=f2f2f2

[key-bindings]
# Font size controls
font-increase=Control+plus Control+equal Control+KP_Add
font-decrease=Control+minus Control+KP_Subtract
font-reset=Control+0 Control+KP_0

# Copy/paste
clipboard-copy=Control+Shift+c XF86Copy
clipboard-paste=Control+Shift+v XF86Paste
primary-paste=Shift+Insert Control+Shift+s

# Scrollback
scrollback-up-page=Shift+Up
scrollback-down-page=Shift+Down
scrollback-up-line=Control+Up
scrollback-down-line=Control+Down

# Browse scrollback in nvim (kitty's show_scrollback equivalent)
pipe-scrollback=[sh -c "t=$(mktemp) && cat > $t && foot nvim -c 'normal G' -c 'set clipboard=unnamedplus' -c 'nnoremap q :qa!<CR>' $t; rm -f $t"] Control+Shift+h

[text-bindings]
# Shift+Enter sends CSI-u newline so Claude Code (in tmux) gets a newline
\x1b[13;2u=Shift+Return
