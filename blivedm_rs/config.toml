[tts]
server = "http://localhost:8000"

# ali_model = "qwen3-tts-flash"
# ali_voice = "Momo"
# ali_language_type = "Auto"

[auto_reply]
enabled = true
cooldown_seconds = 2
triggers = [
    { keywords = [
        "什么系统",
        "what os",
        "用的什么操作系统",
        "operating system",
    ], response = "使用 Arch Linux btw" },
    { keywords = [
        "什么桌面",
        "what wm",
        "什么窗口管理器",
        "window manager",
        "desktop environment",
    ], response = "sway" },
    { keywords = [
        "什么终端",
        "what terminal",
        "terminal emulator",
    ], response = "Kitty Terminal" },
    { keywords = [
        "什么编辑器",
        "what editor",
        "用的什么编辑器",
        "code editor",
    ], response = "nvim" },
]
