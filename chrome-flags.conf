# Chrome command-line flags, read by /usr/bin/google-chrome-stable
# One flag per line. Lines starting with # are ignored.
#
# Note: flags set via chrome://flags (UI) take precedence over the same
# flag here. Only keep entries here that the UI does not already set.

# Force native Wayland (not XWayland).
--ozone-platform=wayland

# Workaround for stutter/flicker when scrolling in Wayland fullscreen
# (compositor direct-scanout + Chrome fractional-scale frame pacing).
--disable-features=WaylandFractionalScaleV1
