# frpc — frp client that reverse-tunnels this host's SSH port out through a
# public frps server, managed via Docker Compose.
#
# frp (Fast Reverse Proxy) has two halves: frps runs on a box with a public IP;
# frpc (this stack) dials OUT to it and asks it to expose a chosen remotePort.
# Anything that connects to frps:remotePort is tunneled back down to localPort 22
# here — so you can ssh into this NAT'd/firewalled machine from anywhere:
#
#   ssh -p <FRP_SSH_REMOTE_PORT> <user>@<FRP_SERVER_ADDR>
#
# Networking: like kookeey-bridge, this runs with network_mode: host. Not for a
# published port (frpc dials out, it never listens on the LAN) but because this
# host's Docker *bridge* network has no outbound egress — a bridged frpc could
# never reach the frps server. Host mode also lets it reach the host's own sshd
# directly at 127.0.0.1:22. (This is how snowdreamtech's own docs run it too:
# `docker run --network host ... snowdreamtech/frpc`.)
#
# Config split (same convention as the other stacks): the committed frpc.toml
# holds only the structure and references secrets via frp's Go-template env
# support ({{ .Envs.FRP_* }}). The real values live in compose/frpc/.env
# (gitignored via compose/**/.env) and are injected as container env vars below,
# where frpc renders them into the config at startup. Set it up once:
#
#   cd compose/frpc && cp .env.example .env && $EDITOR .env
#   docker compose -f compose/frpc/compose.yaml up -d
#
# The :? guards abort `up` with a naming message if .env is missing/unset rather
# than starting a broken tunnel. TOML config needs frp >= v0.52, which :latest
# satisfies.
services:
  frpc:
    image: snowdreamtech/frpc
    container_name: frpc
    restart: unless-stopped
    network_mode: host
    volumes:
      # Committed config with {{ .Envs.* }} placeholders, mounted read-only at
      # the image's default config path. `./` is relative to this compose file's
      # own directory (the default project dir even when started with -f).
      - "./frpc.toml:/etc/frp/frpc.toml:ro"
    environment:
      # Sourced from compose/frpc/.env. :? aborts `up` if a required value is
      # unset; :-7000 defaults the frps port. frpc reads these as {{ .Envs.* }}.
      FRP_SERVER_ADDR: "${FRP_SERVER_ADDR:?set FRP_SERVER_ADDR in compose/frpc/.env (see .env.example)}"
      FRP_SERVER_PORT: "${FRP_SERVER_PORT:-7000}"
      FRP_TOKEN: "${FRP_TOKEN:?set FRP_TOKEN in compose/frpc/.env (see .env.example)}"
      FRP_SSH_REMOTE_PORT: "${FRP_SSH_REMOTE_PORT:?set FRP_SSH_REMOTE_PORT in compose/frpc/.env (see .env.example)}"
